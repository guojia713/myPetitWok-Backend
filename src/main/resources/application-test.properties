# =============================================
# TEST PROFILE — H2 in-memory, no AWS needed
# Activated automatically during: ./mvnw test
# =============================================

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway for tests — DDL handled by Hibernate
spring.flyway.enabled=false

# Disable AWS Parameter Store config data location resolver during tests
# This prevents AWS SDK from trying to load config during bootstrap phase
spring.config.import=optional:aws-parameterstore:

spring.main.allow-bean-definition-overriding=true

jwt.secret=test-secret-key-must-be-at-least-32-characters-long
jwt.expiration-ms=3600000

aws.region=eu-west-1
aws.s3.bucket=test-bucket
aws.s3.base-url=http://localhost/test

logging.level.com.example.cuisine=DEBUG
logging.level.org.springframework.security=DEBUG
