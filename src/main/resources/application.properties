# =============================================
# APPLICATION
# =============================================
spring.application.name=myPetitWok
server.port=${SERVER_PORT:8080}

# =============================================
# DATABASE — injected by AWS at runtime
# =============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================
# JPA
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# =============================================
# FLYWAY — auto-runs migrations on startup
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =============================================
# JWT
# =============================================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# =============================================
# AWS
# =============================================
aws.region=${AWS_REGION:eu-west-1}
aws.s3.bucket=${S3_BUCKET}
aws.s3.base-url=${S3_BASE_URL}
spring.config.import=optional:aws-parameterstore:/mypetitwok/prod/
spring.cloud.aws.region.static=${AWS_REGION:eu-west-1}

# =============================================
# FILE UPLOAD (max 5MB)
# =============================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# =============================================
# LOGGING
# =============================================
logging.level.com.example.cuisine=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
